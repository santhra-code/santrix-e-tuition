version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: santrix-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - santrix-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: santrix-backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://root:password@mongodb:27017/santrix-e-tuitions?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    volumes:
      - ./backend/src:/app/src
    networks:
      - santrix-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: santrix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_APP_NAME: Santrix E-Tuitions
    networks:
      - santrix-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  santrix-network:
    driver: bridge
